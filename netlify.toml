[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Fallback SPA: los archivos existentes (assets, sw.js, manifest, iconos) se
# sirven directo; solo las rutas desconocidas caen a index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# El service worker y el manifest no deben cachearse de forma agresiva, para
# que las actualizaciones lleguen enseguida.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"
